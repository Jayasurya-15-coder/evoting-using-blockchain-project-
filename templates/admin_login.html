{% extends "base.html" %}
{% block title %}Admin Login | BlockVote{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-icon-wrap">
      <i class="bi bi-shield-lock-fill auth-icon"></i>
    </div>
    <h4 class="auth-title">Admin Login</h4>
    <p class="auth-sub">Secure access to election management</p>

    <form method="POST" action="{{ url_for('admin_login') }}" novalidate>
      <div class="mb-3">
        <label class="form-label text-light">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-accent">
            <i class="bi bi-person-fill"></i>
          </span>
          <input type="text" name="username" class="form-control bg-dark text-light border-secondary"
                 placeholder="Enter admin username" required autocomplete="username"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label text-light">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-accent">
            <i class="bi bi-lock-fill"></i>
          </span>
          <input type="password" name="password" id="adminPass" class="form-control bg-dark text-light border-secondary"
                 placeholder="Enter password" required autocomplete="current-password"/>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass('adminPass', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-accent w-100 fw-semibold py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login as Admin
      </button>
    </form>

    <div class="auth-hint mt-3">
      <i class="bi bi-info-circle me-1"></i>admin login here
    </div>
    <div class="text-center mt-3">
      <a href="{{ url_for('home') }}" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePass(id, btn) {
  const field = document.getElementById(id);
  const isText = field.type === 'text';
  field.type = isText ? 'password' : 'text';
  btn.innerHTML = isText ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
}
</script>
{% endblock %}
